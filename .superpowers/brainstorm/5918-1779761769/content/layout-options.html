<h2>蓝色玻璃拟态风格 — 你更喜欢哪种布局？</h2>

<div class="cards">

  <div class="card" data-choice="centered-card" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="height:260px;border-radius:8px;overflow:hidden;background:linear-gradient(135deg, #1e3a5f 0%, #1e40af 30%, #2563eb 60%, #3b82f6 100%);display:flex;align-items:center;justify-content:center;position:relative">
        <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);top:-80px;right:-80px"></div>
        <div style="position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);bottom:-60px;left:-60px"></div>
        <div style="background:rgba(255,255,255,0.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:32px 28px;width:300px;z-index:1;box-shadow:0 20px 60px rgba(0,0,0,0.15)">
          <div style="text-align:center;margin-bottom:20px">
            <div style="color:#fff;font-size:20px;font-weight:800;margin-bottom:4px">本体建模系统</div>
            <div style="color:rgba(255,255,255,0.55);font-size:9px;letter-spacing:0.12em">ONTOLOGY MODELING</div>
          </div>
          <div style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:8px;height:10px;margin-bottom:8px"></div>
          <div style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:8px;height:10px;margin-bottom:14px"></div>
          <div style="background:rgba(255,255,255,0.9);border-radius:8px;height:10px"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>全屏居中卡片式</h3>
      <p>整个背景铺满蓝色渐变 + 光晕，一张玻璃卡片居中放品牌+表单。最简洁，视觉聚焦到极致</p>
    </div>
  </div>

  <div class="card" data-choice="asymmetric-split" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;height:260px;border-radius:8px;overflow:hidden">
        <div style="flex:0 0 42%;background:linear-gradient(160deg, #1e3a5f 0%, #1e40af 40%, #2563eb 100%);display:flex;align-items:center;justify-content:center;position:relative">
          <div style="position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%)"></div>
          <div style="z-index:1;text-align:center;color:#fff">
            <div style="font-size:24px;font-weight:800;margin-bottom:4px">本体建模</div>
            <div style="font-size:8px;opacity:0.5;letter-spacing:0.1em">ONTOLOGY MODELING</div>
          </div>
        </div>
        <div style="flex:1;background:rgba(248,250,252,0.95);display:flex;align-items:center;justify-content:center;position:relative">
          <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%, rgba(37,99,235,0.06) 0%, transparent 70%)"></div>
          <div style="background:#fff;border:1px solid #e8ecf1;border-radius:16px;padding:24px 24px;width:75%;z-index:1;box-shadow:0 4px 24px rgba(0,0,0,0.04)">

            <div style="background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:8px;height:10px"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>非对称左右分栏</h3>
      <p>左侧 42% 蓝色渐变 + 品牌，右侧淡蓝底 + 白色卡片表单。保留分栏但缩小左侧，右侧有层次</p>
    </div>
  </div>

  <div class="card" data-choice="layered-glass" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="height:260px;border-radius:8px;overflow:hidden;background:linear-gradient(135deg, #eff6ff 0%, #dbeafe 40%, #bfdbfe 80%, #93c5fd 100%);display:flex;align-items:center;justify-content:center;position:relative">
        <div style="position:absolute;width:350px;height:350px;border:2px solid rgba(37,99,235,0.06);border-radius:50%"></div>
        <div style="position:absolute;width:250px;height:250px;border:2px solid rgba(37,99,235,0.08);border-radius:50%"></div>
        <div style="display:flex;gap:24px;z-index:1;align-items:center">
          <div style="background:rgba(255,255,255,0.4);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.5);border-radius:20px;padding:28px 24px;text-align:center;box-shadow:0 12px 40px rgba(30,64,175,0.08)">
            <div style="color:#1e40af;font-size:20px;font-weight:800;margin-bottom:2px">本体建模</div>
            <div style="color:rgba(30,64,175,0.4);font-size:8px;letter-spacing:0.1em">ONTOLOGY</div>
          </div>
          <div style="background:rgba(255,255,255,0.7);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.6);border-radius:20px;padding:24px 24px;width:180px;box-shadow:0 12px 40px rgba(30,64,175,0.1)">
            <div style="color:#1e293b;font-size:13px;font-weight:700;margin-bottom:12px">登录</div>
            <div style="background:rgba(241,245,249,0.5);border:1px solid rgba(203,213,225,0.3);border-radius:8px;height:7px;margin-bottom:6px"></div>
            <div style="background:rgba(241,245,249,0.5);border:1px solid rgba(203,213,225,0.3);border-radius:8px;height:7px;margin-bottom:12px"></div>
            <div style="background:#2563eb;border-radius:8px;height:9px"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>双层玻璃卡片叠加</h3>
      <p>浅蓝渐变背景 + 两个玻璃卡片并排（品牌卡+登录卡），同心圆环装饰，层次丰富，精致感强</p>
